<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URIKAI - Viewer</title>
    <style>
        :root {
            --primary: #0a2f5c;
            --accent: #d4a537;
            --bg: #0d1117;
            --bg-card: #161b22;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --border: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Meiryo UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: var(--bg-card);
            border-bottom: 2px solid var(--accent);
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }
        .toolbar a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .toolbar a:hover { text-decoration: underline; }
        .toolbar .title {
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
        }
        .viewer-container {
            flex: 1;
            position: relative;
        }
        .viewer-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* Loading overlay - covers iframe until Office viewer loads */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="index.html">&larr; Back</a>
        <span class="title" id="slideTitle">Loading...</span>
    </div>
    <div class="viewer-container">
        <iframe class="viewer-frame" id="viewerFrame" src="about:blank"></iframe>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">スライドを読み込み中...</div>
        </div>
    </div>

    <script>
        // Check session auth
        if (sessionStorage.getItem('urikai_auth') !== 'true') {
            window.location.href = 'index.html';
        }

        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const title = params.get('title') || file;
        const num = params.get('num') || '';

        document.getElementById('slideTitle').textContent = (num ? 'Section ' + num + ' — ' : '') + (title || '');

        if (file) {
            const baseUrl = window.location.origin + window.location.pathname.replace('viewer.html', '');
            const fileUrl = baseUrl + encodeURIComponent(file);
            const officeUrl = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(fileUrl);

            const iframe = document.getElementById('viewerFrame');
            iframe.src = officeUrl;

            // Fade out loading overlay after iframe loads
            iframe.addEventListener('load', () => {
                // Wait a bit for Office viewer to render past its splash
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('fade-out');
                }, 2000);
            });

            // Fallback: remove overlay after max wait time
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('fade-out');
            }, 8000);
        }

        // Block right-click to discourage saving
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
